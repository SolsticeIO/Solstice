name: Notify Activity to Telegram

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Send notification to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          python -c "
          import os, requests
          
          bot_token = os.environ.get('BOT_TOKEN')
          chat_id = os.environ.get('CHAT_ID')
          topic_id = os.environ.get('TOPIC_ID')
          event = os.environ.get('EVENT_NAME')
          actor = os.environ.get('ACTOR')
          repo = os.environ.get('REPO')
          
          if not bot_token or not chat_id:
              print('Telegram credentials not configured.')
              exit(0)
          
          if event == 'watch':
              action = 'starred'
          elif event == 'fork':
              action = 'forked'
          elif event == 'issues':
              action = 'opened an issue in'
          elif event == 'pull_request':
              action = 'opened a PR in'
          else:
              action = f'triggered {event} in'
              
          message = f'User [{actor}](https://github.com/{actor}) {action} the repository [{repo}](https://github.com/{repo})!'
          
          url = f'https://api.telegram.org/bot{bot_token}/sendMessage'
          payload = {
              'chat_id': chat_id,
              'text': message,
              'parse_mode': 'Markdown',
              'disable_web_page_preview': True
          }
          if topic_id:
              payload['message_thread_id'] = topic_id
              
          response = requests.post(url, json=payload)
          if response.status_code != 200:
              print(f'Failed to send message: {response.status_code} {response.text}')
          else:
              print('Message sent successfully!')
          "
